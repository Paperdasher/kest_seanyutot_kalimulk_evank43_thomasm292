<!DOCTYPE html>
<html>
<head>
    <title>Login - tummi</title>
    <link href="{{ url_for('static', filename='tailwind.min.css') }}" rel="stylesheet">
</head>



<body class="bg-gray-100 flex items-center justify-center h-screen">
  <div class="bg-white p-6 rounded shadow">
    <div class="bg-white p-8 rounded shadow-md w-96">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            {% if category == 'danger' %}
              <div class="mb-4 p-3 rounded bg-red-100 text-red-700 border border-red-300">
                {{ message }}
              </div>
            {% endif %}
          {% endfor %}
        {% endif %}
      {% endwith %}
        <h1 class="text-2xl font-bold mb-6 text-center">Login</h1>
        <form method="POST">
            <div class="mb-4">
                <label class="block text-gray-700">Username</label>
                <input type="text" name="username" class="w-full border p-2 rounded" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700">Password</label>
                <input type="password" name="password" class="w-full border p-2 rounded" required>
            </div>
            <button type="submit" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Login</button>
        </form>
        <p class="mt-4 text-center">
            <a href="/register" class="text-blue-500">Register</a>
        </p>
    </div>
</body>
</html>
